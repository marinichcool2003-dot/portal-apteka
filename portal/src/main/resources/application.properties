# --- Основные настройки приложения ---
spring.application.name=portal

# --- Настройки подключения к базе данных ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Настройки JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# --- Настройки Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true

# --- Настройки JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.refresh.expiration-with-remember=${JWT_REFRESH_EXPIRATION_WITH_REMEMBER:2592000000}

# --- Настройки Redis ---
# ИСПРАВЛЕНО: Дефолтное значение изменено на redis-cache для совпадения с compose
spring.data.redis.host=${REDIS_HOST:redis-cache}
spring.data.redis.port=${REDIS_PORT:6379}

# --- Настройки кэша ---
spring.cache.type=redis

# --- Настройки по умолчанию ---
app.default.admin.login=${ADMIN_LOGIN}
app.default.admin.password=${ADMIN_PASSWORD}
app.default.react.host=${REACT_HOST:http://localhost:5174}

# Настройки папок
app.default.upload.task-picture.dir=${DEFAULT_UPLOAD_DIR:/app/uploads/pictures}
app.default.avatars.upload.dir=${DEFAULT_AVATARS_DIR:/app/uploads/avatars}

springdoc.override-with-generic-response=false
