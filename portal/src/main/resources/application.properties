# --- Основные настройки приложения ---
spring.application.name=portal

# --- Настройки подключения к базе данных ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portal}
spring.datasource.username=${DB_USERNAME:dir}
spring.datasource.password=${DB_PASSWORD:852456}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Настройки JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# --- Настройки Flyway ---
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portal}
spring.flyway.user=${DB_USERNAME:dir}
spring.flyway.password=${DB_PASSWORD:852456}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true

# --- Настройки JWT ---
jwt.secret=${JWT_SECRET:dev-secret-key-change-me-v7Kq9pjghjR3xN8u8Yj3LzWb4gld445hhgfdssvAAAABBBCCCDDDEEE}
jwt.expiration=86400000
jwt.refresh.expiration=2592000000

# --- Настройки Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- Настройки кэша ---
spring.cache.type=simple

# --- Настройки по умолчанию ---
add.default.admin.login=${ADMIN_LOGIN:admin}
add.default.admin.password=${ADMIN_PASSWORD:admin}

# Настройки папок вынесены в переменные окружения, чтобы картинки сохранялись на диске сервера, а не удалялись при перезапуске контейнера
app.default.upload.task-picture.dir=${DEFAULT_UPLOAD_DIR:/app/uploads/pictures}
app.default.avatars.upload.dir=${DEFAULT_AVATARS_DIR:/app/uploads/avatars}

springdoc.override-with-generic-response=false