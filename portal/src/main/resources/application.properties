# --- Основные настройки приложения ---
spring.application.name=portal

# --- Настройки подключения к базе данных ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Настройки JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# --- Настройки Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.refresh.expiration-with-remember=${JWT_REFRESH_EXPIRATION_WITH_REMEMBER:2592000000}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.connect-timeout=1000
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

app.default.admin.login=${ADMIN_LOGIN}
app.default.admin.password=${ADMIN_PASSWORD}
app.default.react.host=${REACT_HOST:http://localhost:5174}

# Настройки папок
app.default.upload.task-picture.dir=${DEFAULT_UPLOAD_DIR:uploads/pictures}
app.default.avatars.upload.dir=${DEFAULT_AVATARS_DIR:uploads/avatars}

springdoc.override-with-generic-response=false

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.leak-detection-threshold=10000
spring.datasource.hikari.connection-timeout=5000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB